<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Drawing program</title>
  </head>

  <body onload="main()">
    <canvas id="webgl160" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>

    <p id="numdot">XXX</p>

    <p><strong>Awesomeness:</strong> <button type="button" id="rectangleButton">Rectangle</button></p>
    <p>Rectangle: 2 clicks, 1st starting pos, 2nd ending pos.</p>
    <p>
      <button type="button" id="clearButton">Clear</button>
      <button type="button" id="triangleButton">Triangle</button>
      <button type="button" id="pointButton">Point</button>
      <button type="button" id="circleButton">Circle</button>
      <button type="button" id="pictureButton">Picture</button>
    </p>

    <p>
      R: <input type="range" id="r" value=1 min=0 max=1 step=0.01>
      G: <input type="range" id="g" value=0 min=0 max=1 step=0.01>
      B: <input type="range" id="b" value=0 min=0 max=1 step=0.01>
    </p>
    <p>
      Size: <input type="range" id="s" value=10 min=1 max=100 step=1>
    </p>
    <p>
      Segments: <input type="range" id="seg" value=10 min=1 max=100 step=1>
    </p>


    <p>Reference Drawing for picture:</p>
    <img src="ref_img.jpg" width="500">

    <script src="../../lib/webgl-utils.js"></script>
    <script src="../../lib/webgl-debug.js"></script>
    <script src="../../lib/cuon-utils.js"></script>
    <script src="ColoredPoints.js"></script>
    <script src="Point.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="DrawPicture.js"></script>
    <script src="Rectangle.js"></script>
  </body>
</html>
